<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- FIXED Tailwind + DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="bg-[#F8FAFC]">

    <!-- Navbar -->
    <header class="bg-base-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-2">

            <div class="flex items-center justify-between">

                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <img src="./assets/github-logo.png" class="w-[36px]" alt="">
                    <h2 class="text-lg md:text-xl font-semibold">
                        GitHub Issues Tracker
                    </h2>
                </div>

                <!-- Mobile Menu Button -->
                <button id="menu-btn" class="md:hidden text-2xl">☰</button>

                <!-- Desktop Menu -->
                <div id="menu" class="hidden md:flex items-center gap-4">

                    <div class="flex gap-2">
                        <input id="search-desktop" type="text"
                            placeholder="Search issues..."
                            class="input input-bordered" />

                        <button onclick="searchIssue()" class="btn btn-primary">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>

                    <button class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> New Issue
                    </button>

                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden flex-col gap-3 mt-3 md:hidden">

                <div class="flex justify-center gap-2">
                    <input id="search-mobile" type="text"
                        placeholder="Search issues..."
                        class="input input-bordered" />

                    <button onclick="searchIssue()" class="btn btn-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>

                <div class="flex justify-center">
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> New Issue
                    </button>
                </div>

            </div>

        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs w-11/12 mx-auto flex justify-center md:justify-start mt-10 bg-white rounded-lg p-4 shadow-md">
        <button class="tab active" onclick="changeTab('all', this)">All</button>
        <button class="tab" onclick="changeTab('open', this)">Open</button>
        <button class="tab" onclick="changeTab('closed', this)">Closed</button>
    </div>

    <!-- Info Section -->
    <section class="flex justify-between items-center w-11/12 mx-auto my-6 bg-white rounded-lg p-4 shadow-md">

        <div class="flex items-center gap-3">

            <img class="bg-[#ECE4FF] rounded-full p-2" src="./assets/Aperture.png" alt="">

            <div>
                <!-- ✅ FIXED TAG -->
                <h2 id="count" class="font-bold text-xl">0 Issues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>

        </div>

        <div class="flex items-center gap-3">

            <div class="flex items-center gap-2">
                <div class="status status-success"></div>
                <p>Open</p>
            </div>

            <div class="flex items-center gap-2">
                <div class="status status-primary"></div>
                <p>Closed</p>
            </div>

        </div>

    </section>

    <!-- Issues Section -->
    <section class="bg-[#E4E4E7] w-11/12 mx-auto py-5 rounded-sm">
        <div id="issues" class="grid grid-cols-1 md:grid-cols-4 gap-4 p-4"></div>
    </section>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 hidden justify-center items-center backdrop-blur-sm">
        <div class="bg-white p-5 rounded-lg w-[90%] md:w-[500px] shadow-lg">
            <div id="modalContent" class="space-y-5"></div>
        </div>
    </div>

    <!-- JS -->
    <script src="./script/home.js"></script>

</body>
</html>
