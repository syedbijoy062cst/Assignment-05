  <section   class="bg-gray-100">
     <div class="navbar bg-base-200 shadow-sm px-6">
    
    <!-- Left -->
    <div class="flex-1 flex items-center gap-2">
      <img src="assets/github-logo.png" class="w-6 h-6">
      <span class="text-lg font-semibold">GitHub Issues Tracker</span>
    </div>

    <!-- Right -->
    <div class="flex-none gap-3">

      <!-- Search -->
      <input 
        type="text" 
        placeholder="Search issues..."

      />

      <!-- Button -->
      <button class="btn btn-primary btn-sm">
        + New Issue
      </button>

    </div>

  <!-- Tabs Section -->
  <div class="max-w-4xl mx-auto mt-10 bg-base-100 p-6 rounded-xl shadow">

    <div id="" class="flex gap-2">
      
      <button class="btn tab-1 btn-primary btn-sm">All</button>
      <button class="btn tab-2 btn-outline btn-sm">Open</button>
      <button class="btn btn-outline btn-sm">Closed</button>
